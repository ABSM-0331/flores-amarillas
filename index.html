<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        .titulo {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.62);
            color: #5a420a;
            font-size: clamp(20px, 3vw, 36px);
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            border: 1px solid rgba(180, 140, 50, 0.35);
            box-shadow: 0 4px 14px rgba(90, 66, 10, 0.1);
            pointer-events: none;
        }

        .pantalla-clave {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, #fbeab4 0%, #efcd71 100%);
            z-index: 20;
            transition: opacity 280ms ease;
        }

        .pantalla-clave.oculta {
            opacity: 0;
            pointer-events: none;
        }

        body.bloqueado .titulo,
        body.bloqueado .firma,
        body.bloqueado canvas {
            visibility: hidden;
        }

        .panel-clave {
            width: min(92vw, 420px);
            padding: 22px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(170, 128, 44, 0.4);
            box-shadow: 0 12px 28px rgba(90, 66, 10, 0.22);
        }

        .panel-clave h2 {
            margin: 0 0 10px;
            color: #5a420a;
            font-size: clamp(20px, 4vw, 26px);
            text-align: center;
        }

        .panel-clave p {
            margin: 0 0 14px;
            color: #6a531b;
            text-align: center;
            font-size: 14px;
        }

        .campo-clave {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(175, 135, 52, 0.5);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 16px;
            outline: none;
            margin-bottom: 10px;
        }

        .campo-clave:focus {
            border-color: #b98f30;
            box-shadow: 0 0 0 3px rgba(185, 143, 48, 0.18);
        }

        .btn-clave {
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(180deg, #ebb644, #c79123);
        }

        .error-clave {
            min-height: 18px;
            margin: 10px 0 0;
            color: #b12222;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .firma {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            margin: 0;
            padding: 6px 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.48);
            color: #4f5c2f;
            font-size: clamp(12px, 1.6vw, 15px);
            letter-spacing: 0.2px;
            border: 1px solid rgba(120, 145, 75, 0.35);
            pointer-events: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <div id="pantallaClave" class="pantalla-clave">
        <div class="panel-clave">
            <h2>Ingresa la palabra clave</h2>
            <p>Tu sabes que palabra es.</p>
            <input id="claveInput" class="campo-clave" type="password" autocomplete="off" placeholder="Palabra clave">
            <button id="claveBtn" class="btn-clave">Abrir</button>
            <p id="claveError" class="error-clave"></p>
        </div>
    </div>

    <h1 class="titulo">para ti ❤️</h1>
    <canvas id="canvas"></canvas>
    <p class="firma">made by B_Sosa</p>
</body>
<script defer src="script.js"></script>

</html>
