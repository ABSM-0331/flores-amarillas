<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }

        .titulo {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.62);
            color: #5a420a;
            font-size: clamp(20px, 3vw, 36px);
            font-weight: 700;
            letter-spacing: 0.3px;
            text-align: center;
            border: 1px solid rgba(180, 140, 50, 0.35);
            box-shadow: 0 4px 14px rgba(90, 66, 10, 0.1);
            pointer-events: none;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>
    <h1 class="titulo">no te quedas sin tus flores amarillas</h1>
    <canvas id="canvas"></canvas>
</body>
<script defer src="script.js"></script>

</html>
